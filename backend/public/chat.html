<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    #chat-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="chat-container"></div>

  <script>
    (function() {
      // Parse URL parameters
      const params = new URLSearchParams(window.location.search);
      const companyId = params.get('company');
      const primaryColor = params.get('color') || '#3b82f6';
      const position = params.get('position') || 'bottom-right';
      const welcomeMessage = params.get('welcome');
      const domain = params.get('domain');

      if (!companyId) {
        document.getElementById('chat-container').innerHTML =
          '<div style="padding: 20px; color: #ef4444; font-family: system-ui;">Error: Missing company parameter</div>';
        return;
      }

      // Get the base URL from current location
      const baseUrl = window.location.origin;

      // Load widget CSS
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = baseUrl + '/widget.css';
      document.head.appendChild(link);

      // Load widget JS
      const script = document.createElement('script');
      script.src = baseUrl + '/widget.iife.js';
      script.onload = function() {
        // Initialize widget in embedded mode (fills container instead of floating)
        if (window.InsuranceWidget) {
          window.InsuranceWidget.init({
            companyId: companyId,
            apiUrl: baseUrl,
            primaryColor: primaryColor,
            position: 'embedded',
            welcomeMessage: welcomeMessage || undefined,
            domain: domain || window.location.hostname,
            embedded: true
          });
        }
      };
      script.onerror = function() {
        document.getElementById('chat-container').innerHTML =
          '<div style="padding: 20px; color: #ef4444; font-family: system-ui;">Error: Failed to load widget</div>';
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
